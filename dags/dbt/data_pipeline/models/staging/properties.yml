version: 2

models:
  - name: stg_movie_details
    config:
      materialized: table
      database: tesla_staging_db
      schema: cinema
    columns:
      - name: movie_id
        description: "The ID of the movie."
        data_type: int
        data_tests:
          - unique
          - not_null
      - name: budget
        description: "The budget of the movie."
        data_type: int
        data_tests:
          - generic_non_negative
      - name: revenue
        description: "The revenue of the movie."
        data_type: int
        data_tests:
          - generic_non_negative
