        description: "The ID of the movie."
        data_type: int
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('fact_movie')
                field: movie_id
      - name: person_id
        description: "The ID of the person."
        data_type: int
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_person')
                field: person_id

  - name: bridge_movie_company
    data_tests:
