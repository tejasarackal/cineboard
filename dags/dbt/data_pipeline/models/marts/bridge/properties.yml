version: 2

models:
  - name: bridge_movie_genre
    data_tests:
    - dbt_utils.unique_combination_of_columns:
        arguments:
          combination_of_columns:
            - movie_id
            - genre_id
    columns:
      - name: movie_id
        description: "The ID of the movie."
        data_type: int
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('fact_movie')
                field: movie_id
      - name: genre_id
        description: "The ID of the genre."
        data_type: int
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_genre')
                field: genre_id

  - name: bridge_movie_cast
    data_tests:
    - dbt_utils.unique_combination_of_columns:
        arguments:
          combination_of_columns:
            - movie_id
            - person_id
    columns:
      - name: movie_id
        description: "The ID of the movie."
        data_type: int
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('fact_movie')
                field: movie_id
      - name: person_id
        description: "The ID of the person."
        data_type: int
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_person')
                field: person_id

  - name: bridge_movie_director
