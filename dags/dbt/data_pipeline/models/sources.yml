version: 2

sources:
  - name: tmdb
    description: "Raw movie data from the TMDB API, one VARIANT payload per row."
    database: tesla_raw_db
    schema: tmdb
    tables:
      - name: raw_movies
        description: "Raw movie data from the TMDB API, one VARIANT payload per row."
        columns:
          - name: raw_payload
            description: "The raw JSON payload from the TMDB API."
            data_type: variant
      - name: raw_movie_details
        description: "Raw movie details data from the TMDB API, one VARIANT payload per row."
        columns:
          - name: raw_payload
            description: "The raw JSON payload from the TMDB API."
            data_type: variant
      - name: raw_credits
        description: "Raw credits data from the TMDB API, one VARIANT payload per row."
        columns:
          - name: raw_payload
            description: "The raw JSON payload from the TMDB API."
            data_type: variant