name: data_pipeline

profile: data_pipeline

seed-paths: ["seeds"]
model-paths: ["models"]
macro-paths: ["macros"]
clean-targets:
  - "target"
  - "dbt_packages"

seeds:
  # Builds seeds into '<your_schema_name>_raw'
  data_pipeline:
    +schema: raw

models:
  data_pipeline:
    +static_analysis: strict
    # Materialize staging models as views, and marts as tables
    staging:
      +materialized: table
      +database: tesla_staging_db
      +schema: movies
    marts:
      finance_mart:
        +materialized: table
        +database: tesla_analytics_db
        +schema: finance_mart
      sales_mart:
        +materialized: table
        +database: tesla_analytics_db
        +schema: sales_mart